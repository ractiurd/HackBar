<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhoulSight — XSS Detected</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0e1119; color: #cdd6f0; height: 100vh; overflow: hidden;
    }
    .container { height: 100vh; display: flex; flex-direction: column; }
    .header { background: #0b0e16; border-bottom: 1px solid #1f2638; padding: 18px 20px; }
    .title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .title::before { content: '🛡️'; }
    .tagline { font-size: 11px; color: #8b94ad; font-style: italic; margin-bottom: 10px; }
    .badge {
      display: inline-block; background: #dc2626; color: #fff;
      padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .content { flex: 1; padding: 18px 20px; overflow-y: auto; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .info-item { background: #0b0e16; border: 1px solid #1f2638; border-radius: 6px; padding: 11px; }
    .info-label { font-size: 10px; color: #8b94ad; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; font-weight: 600; }
    .info-value { font-size: 12px; color: #cdd6f0; word-break: break-all; font-family: 'Consolas', 'Monaco', monospace; }
    .poc-section { background: #0b0e16; border: 1px solid #1f2638; border-radius: 6px; overflow: hidden; margin-bottom: 14px; }
    .poc-header { background: #141a28; padding: 9px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1f2638; }
    .poc-title { font-size: 11px; color: #cdd6f0; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .poc-type { font-size: 10px; color: #8b94ad; background: #1f2638; padding: 3px 8px; border-radius: 3px; }
    .poc-code {
      padding: 14px; color: #d1d5db; font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px; line-height: 1.55; max-height: 180px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
    }
    .actions { display: flex; gap: 10px; padding: 14px 20px; background: #0b0e16; border-top: 1px solid #1f2638; }
    .btn {
      flex: 1; padding: 9px 14px; border: 1px solid #1f2638; border-radius: 6px;
      background: #141a28; color: #cdd6f0; font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .btn:hover { background: #1f2638; border-color: #2d3650; }
    .btn-primary { background: #dc2626; border-color: #dc2626; color: #fff; }
    .btn-primary:hover { background: #b91c1c; border-color: #b91c1c; }
    .status { margin: 0 20px 14px; padding: 9px 14px; border-radius: 6px; font-size: 12px; display: none; }
    .status.show { display: block; }
    .status.success { background: #06281d; border: 1px solid #10b981; color: #6ee7b7; }
    .status.error { background: #2a0d0d; border: 1px solid #dc2626; color: #fca5a5; }
    .status.info { background: #11203a; border: 1px solid #3b82f6; color: #93c5fd; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0b0e16; }
    ::-webkit-scrollbar-thumb { background: #2d3650; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">GhoulSight Scanner</div>
      <div class="tagline">GhoulSight Walks the Graveyard — XSS That Moves Leaves a Shadow</div>
      <div class="badge">XSS Vulnerability Detected</div>
    </div>
    <div class="content">
      <div class="info-grid">
        <div class="info-item"><div class="info-label">Target URL</div><div class="info-value" id="targetUrl">Loading...</div></div>
        <div class="info-item"><div class="info-label">Parameter</div><div class="info-value" id="parameter">Loading...</div></div>
        <div class="info-item"><div class="info-label">Discovered</div><div class="info-value" id="timestamp">Loading...</div></div>
        <div class="info-item"><div class="info-label">API Calls</div><div class="info-value" id="apiCalls">Loading...</div></div>
      </div>
      <div class="poc-section">
        <div class="poc-header">
          <span class="poc-title">Proof of Concept</span>
          <span class="poc-type" id="pocType">...</span>
        </div>
        <div class="poc-code" id="pocCode">Loading PoC...</div>
      </div>
      <div class="status" id="status"></div>
    </div>
    <div class="actions">
      <button class="btn" id="copyBtn">Copy PoC</button>
      <button class="btn btn-primary" id="executeBtn">Execute in Tab</button>
    </div>
  </div>
  <script src="gs_result.js"></script>
</body>
</html>
